training:
  batch_size: 1
  lr: 2e-5
  epochs_number: 20
  warmup_steps: 5000
  alpha: 0.5
imageEncoder:
  prefix_length: 10 
  prefix_length_clip: 10
  prefix_dimension: 2048  
mapping:
  num_layers: 8
paths:
  data_dir: "dataset/MIMIC-CXR"
  classifier_predictions: "results/textClassifierResults/predictions_train.csv"
  checkpoints: "./results/lateResults"
  checkpoints_load: "./results/lateResults/checkpoint.pt"
  checkpoints_load_classifier: "./results/textClassifierResults/checkpoint.pt"
  predictions_path: "./results/lateResults"
  evaluation_path: "./results/lateResults"
generation:
  beam_size: 5
  entry_length: 300
  temperature: 1.0
  prompt: ""
